<!DOCTYPE html>
<html lang="en">
<head>
  <title>Crud Func</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

<div id ="parent-div" class="container-fluid">
    <div id="main-Div">
        <div class="row h-100">
            <div class="col-lg-6 col-md-6 col-12 d-flex flex-column justify-content-center align-items-center">
                <div class="add-outer-class">
                    <form action="javascript:void(0);" method="POST" onsubmit="app.Add()"> 
                      <input type="text" id="add-name"  placeholder="Add country">
                      <input type="submit" value="Add"  class="btn btn-secondary add-btn">
                    </form>
                    </div>
                    
                    <div id="spoiler" role="aria-hidden">
                      <form action="javascript:void(0);" method="POST" id="saveEdit">
                        <input type="text" id="edit-name">
                        <input type="submit" value="Edit"  class="btn btn-primary edit-btn" /> <a onclick="CloseInput()" aria-label="Close">&#10006;</a>
                      </form>
                    </div>
                    
                    <div class="count-section">
                    <p id="counter"></p>
                    </div>
            </div>
            <div class="col-lg-6 col-md-6 col-12 sec-column overflow-auto">
                <div class="table-section">
                    <table>
                      <!-- <tr class="">
                        <th>Name</th>
                      </tr> -->
                        <tbody id="countries">
                        </tbody>
                    </table>
                    </div>
            </div>

        </div>
    </div>
  
</div>

<script>
    var app = new function() {
    
      this.el = document.getElementById('countries');
    
      this.countries = ['France', 'Germany', 'England', 'Irland', 'Luxembourg'];
    
      this.Count = function(data) {
        var el   = document.getElementById('counter');
        var name = 'country';
    
        if (data) {
          if (data > 1) {
            name = 'Countries';
          }
          el.innerHTML = data + ' ' + name ;
        } else {
          el.innerHTML = 'No ' + name;
        }
      };
      
      this.FetchAll = function() {
        var data = '';
    
        if (this.countries.length > 0) {
          for (i = 0; i < this.countries.length; i++) {
            data += '<tr>';
            data += '<td class="title-class">' + this.countries[i] + '</td>';
            data += '<td><button onclick="app.Edit(' + i + ')" class="edit-class">Edit</button></td>';
            data += '<td><button onclick="app.Delete(' + i + ')" class="del-class">Delete</button></td>';
            data += '</tr>';
          }
        }
    
        this.Count(this.countries.length);
        return this.el.innerHTML = data;
      };
    
      this.Add = function () {
        el = document.getElementById('add-name');
        // Get the value
        var country = el.value;
    
        if (country) {
          // Add the new value
          this.countries.push(country.trim());
          // Reset input value
          el.value = '';
          // Dislay the new list
          this.FetchAll();
        }
      };
    
      this.Edit = function (item) {
        var el = document.getElementById('edit-name');
        // Display value in the field
        el.value = this.countries[item];
        // Display fields
        document.getElementById('spoiler').style.display = 'block';
        self = this;
    
        document.getElementById('saveEdit').onsubmit = function() {
          // Get value
          var country = el.value;
    
          if (country) {
            // Edit value
            self.countries.splice(item, 1, country.trim());
            // Display the new list
            self.FetchAll();
            // Hide fields
            CloseInput();
          }
        }
      };
    
      this.Delete = function (item) {
        // Delete the current row
        this.countries.splice(item, 1);
        // Display the new list
        this.FetchAll();
      };
      
    }
    
    app.FetchAll();
    
    function CloseInput() {
      document.getElementById('spoiler').style.display = 'none';
    }
    </script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
